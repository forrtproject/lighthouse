<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About — FORRT Lighthouse</title>
<link rel="icon" type="image/webp" href="/static/images/icon.webp">
<link rel="stylesheet" href="/static/css/style.css">
<link rel="stylesheet" href="/static/css/about.css">
</head>
<body>
<div id="app">
  <header id="header">
    <div id="logo-wrap">
      <a href="/" class="logo-link">
        <img src="/static/images/logo.svg" alt="Lighthouse logo" height="30">
        <span class="logo-text">Lighthouse</span>
      </a>
    </div>
    <div id="header-right">
      <a href="/" id="home-link" class="nav-link">Home</a>
      <a href="/about" id="about-link" class="nav-link">About</a>
      <button id="theme-toggle" aria-label="Toggle theme" title="Toggle dark/light mode">
        <svg id="icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" fill="currentColor"/><g stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><line x1="8" y1="1" x2="8" y2="2.5"/><line x1="8" y1="13.5" x2="8" y2="15"/><line x1="1" y1="8" x2="2.5" y2="8"/><line x1="13.5" y1="8" x2="15" y2="8"/><line x1="3.1" y1="3.1" x2="4.2" y2="4.2"/><line x1="11.8" y1="11.8" x2="12.9" y2="12.9"/><line x1="12.9" y1="3.1" x2="11.8" y2="4.2"/><line x1="4.2" y1="11.8" x2="3.1" y2="12.9"/></g></svg>
        <svg id="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="none" style="display:none"><path d="M13.5 9.5A5.5 5.5 0 0 1 6.5 2.5a5.5 5.5 0 1 0 7 7z" fill="currentColor"/></svg>
      </button>
    </div>
  </header>

  <main id="about-main">
    <div id="about-content">
      {{ content | safe }}
    </div>
  </main>
</div>

<script>
  const root = document.documentElement;
  let darkMode = localStorage.getItem('theme') === 'dark' || (localStorage.getItem('theme') === null && window.matchMedia('(prefers-color-scheme:dark)').matches);
  function applyTheme() {
    root.setAttribute('data-theme', darkMode ? 'dark' : 'light');
    localStorage.setItem('theme', darkMode ? 'dark' : 'light');
    document.getElementById('icon-sun').style.display = darkMode ? 'none' : 'block';
    document.getElementById('icon-moon').style.display = darkMode ? 'block' : 'none';
  }
  applyTheme();
  document.getElementById('theme-toggle').addEventListener('click', () => { darkMode = !darkMode; applyTheme(); });
</script>
</body>
</html>
